spring:
  datasource:
    url: jdbc:h2:file:./data/protrackdb;MODE=PostgreSQL;AUTO_SERVER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    defer-datasource-initialization: true

  flyway:
    enabled: false

  sql:
    init:
      mode: always

cors:
  allowed-origins: "http://localhost:3000,http://localhost:5173"

spring:
  application:
    name: protrack-backend

  # ─── DataSource ──────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/protrack_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      pool-name: ProTrackHikariPool

  # ─── JPA ─────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20
        jdbc:
          time_zone: UTC

  # ─── Flyway ──────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  # ─── File Upload ─────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

  # ─── Jackson ─────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: non_null

  # ─── Mail (SMTP) ─────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

# ─── Server ──────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# ─── JWT ─────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:protrack-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
    access-token-expiration-ms: 86400000
    refresh-token-expiration-ms: 604800000

  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  mail:
    enabled: ${MAIL_ENABLED:true}
    from-address: ${MAIL_FROM_ADDRESS:${MAIL_USERNAME:}}
    from-name: ${MAIL_FROM_NAME:ProTrack}
    test-recipient: ${MAIL_TEST_TO:}
    inbound:
      enabled: ${MAIL_INBOUND_ENABLED:false}
      host: ${MAIL_IMAP_HOST:imap.gmail.com}
      port: ${MAIL_IMAP_PORT:993}
      username: ${MAIL_INBOUND_USERNAME:${MAIL_USERNAME:}}
      password: ${MAIL_INBOUND_PASSWORD:${MAIL_PASSWORD:}}
      poll-interval-ms: ${MAIL_POLL_INTERVAL_MS:120000}
      folder: ${MAIL_INBOUND_FOLDER:INBOX}

  storage:
    strategy: local
    local:
      upload-dir: ${UPLOAD_DIR:./uploads}

  cors:
    allowed-origins:
      - ${CORS_ORIGIN:http://localhost:3000}
      - http://localhost:5173

# ─── Logging ─────────────────────────────────────────────────
logging:
  level:
    com.publishflow: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"
